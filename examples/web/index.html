<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge-Cloud Broker Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; height: 100px; padding: 0.5rem; margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; background: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0051a2; }
    #output { margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 4px; min-height: 50px; white-space: pre-wrap; }
    .status { margin-top: 0.5rem; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <h1>Edge-Cloud Compute Broker</h1>
  <p>Type a prompt. Simple prompts run locally (simulated WebLLM), complex ones are routed to the Cloud API.</p>
  
  <textarea id="prompt" placeholder="Enter your prompt here... Try 'Summarize this short text' vs 'Write a complex python script'"></textarea>
  <button id="sendBtn">Send Prompt</button>
  
  <div class="status" id="status"></div>
  <div id="output"></div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
